<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bolão Copa 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f4c430;--emerald:#10b981;--cyan:#00c8e0;--azul:#002776;
  --glass-bg:rgba(255,255,255,.11);--glass-border:rgba(255,255,255,.18);
  --glass-hover:rgba(255,255,255,.16);--glass-input:rgba(255,255,255,.07);
  --text:#f1f5f9;--text-muted:rgba(241,245,249,.72);--text-dim:rgba(241,245,249,.55);
  --blur:blur(16px);--radius:16px;--radius-sm:10px;
}
body{
  font-family:'Segoe UI',system-ui,sans-serif;
  background:#071321;color:var(--text);min-height:100vh;
  background-image:
    repeating-linear-gradient(180deg,transparent,transparent 38px,rgba(16,185,129,.025) 38px,rgba(16,185,129,.025) 39px),
    radial-gradient(ellipse 80% 55% at 10% 5%,rgba(244,196,48,.16) 0%,transparent 50%),
    radial-gradient(ellipse 70% 50% at 90% 90%,rgba(0,39,118,.36) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 30%,rgba(16,185,129,.1) 0%,transparent 60%);
  padding:14px;
}
.app{max-width:860px;margin:0 auto}

/* ── AVATAR INICIAIS (substituição dos SVGs) ── */
.av{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;font-weight:800;color:#fff;flex-shrink:0;letter-spacing:-.5px;font-family:'Segoe UI',system-ui,sans-serif}

/* ── HEADER ── */
.header{position:relative;border-radius:var(--radius);padding:20px 24px 16px;margin-bottom:14px;overflow:hidden;border:1px solid rgba(244,196,48,.28)}
.header-svg{position:absolute;inset:0;width:100%;height:100%}
/* marca d'água taça — elemento principal, sem bola */
.header-trophy{position:absolute;right:72px;top:50%;transform:translateY(-55%);font-size:80px;opacity:.055;pointer-events:none;z-index:0}
.header-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.htitle{display:flex;align-items:center;gap:10px}
.htitle h1{font-size:21px;font-weight:700;color:#fff;letter-spacing:-.3px;text-shadow:0 0 28px rgba(244,196,48,.55)}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:20px;padding:5px 13px;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:.15s}
.live-badge:hover{background:rgba(255,255,255,.2)}
.live-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;animation:pulse 1.4s infinite;box-shadow:0 0 6px #4ade80}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.live-badge.paused .live-dot{background:#9ca3af;animation:none;box-shadow:none}
.live-text{font-size:11px;font-weight:600;color:rgba(255,255,255,.9)}
.hstatus{font-size:10px;color:rgba(255,255,255,.4);text-align:right;margin-top:4px}
/* barra de progresso */
.phase-bar{position:relative;z-index:1;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.08)}
.phase-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.phase-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);display:flex;align-items:center;gap:6px}
.phase-badge{background:rgba(244,196,48,.2);border:1px solid rgba(244,196,48,.35);color:var(--gold);font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px}
.phase-count{font-size:11px;color:rgba(255,255,255,.5)}
.phase-track{height:5px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.phase-fill{height:100%;background:linear-gradient(90deg,var(--azul),var(--emerald),var(--gold));border-radius:4px;transition:.6s ease}

/* ── TOGGLE PALPITES ── */
function togglePalpites(el){
  const arrow=el.querySelector('.palprow-arrow');
  const detail=el.nextElementSibling;
  const isOpen=detail.classList.contains('open');
  detail.classList.toggle('open',!isOpen);
  if(arrow) arrow.classList.toggle('open',!isOpen);
}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:var(--radius-sm);padding:4px;margin-bottom:14px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;border-radius:7px;transition:.18s;border:none;background:none}
.tab.active{background:linear-gradient(135deg,rgba(0,39,118,.7),rgba(16,185,129,.25));color:#fff;border:1px solid rgba(244,196,48,.32);box-shadow:0 0 16px rgba(244,196,48,.14)}
.tab:hover:not(.active){background:rgba(255,255,255,.07);color:var(--text)}
.section{display:none}.section.active{display:block}

/* ── LABELS ── */
.section-label{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(244,196,48,.35),transparent)}

/* ── PÓDIO ── */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.pod-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);padding:18px 14px;text-align:center;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);transition:.2s;position:relative;overflow:hidden}
.pod-card:hover{background:var(--glass-hover);transform:translateY(-2px)}
.pod-card.gold{border-color:rgba(244,196,48,.55);background:rgba(244,196,48,.11);box-shadow:0 0 30px rgba(244,196,48,.22)}
.pod-card.gold::after{content:'';position:absolute;top:0;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,rgba(244,196,48,.9),transparent)}
.pod-card.silver{border-color:rgba(203,213,225,.3);background:rgba(203,213,225,.07)}
.pod-card.bronze{border-color:rgba(180,130,60,.34);background:rgba(180,130,60,.07)}
.pod-medal{font-size:22px;margin-bottom:10px;filter:drop-shadow(0 0 10px rgba(244,196,48,.5))}
.pod-av{display:flex;justify-content:center;margin-bottom:10px}
.pod-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:6px}
.pod-pts{font-size:30px;font-weight:800;line-height:1}
.pod-card.gold .pod-pts{color:var(--gold);text-shadow:0 0 26px rgba(244,196,48,.65)}
.pod-card.silver .pod-pts{color:#e2e8f0}
.pod-card.bronze .pod-pts{color:#e0a87a}
.pod-label{font-size:10px;color:var(--text-dim);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.pod-gap{font-size:10px;color:rgba(244,196,48,.65);margin-top:5px;font-style:italic}
.pod-detail{font-size:11px;color:var(--text-muted);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08);display:flex;justify-content:center;gap:14px}
.pod-stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.pod-stat-val{font-size:15px;font-weight:700;color:var(--emerald)}
.pod-stat-val.gv{color:var(--gold)}
.pod-stat-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px}

/* ── TABELA RANKING ── */
.rtable{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.rth{display:grid;grid-template-columns:52px 1fr 72px 72px 72px;gap:8px;padding:10px 18px;background:rgba(0,39,118,.28);border-bottom:1px solid rgba(255,255,255,.1);font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.rtr{display:grid;grid-template-columns:52px 1fr 72px 72px 72px;gap:8px;padding:13px 18px;border-top:1px solid rgba(255,255,255,.06);align-items:center;transition:.15s}
.rtr:hover{background:rgba(255,255,255,.05)}
.rtr.leader{background:rgba(244,196,48,.07);box-shadow:0 0 28px rgba(244,196,48,.14) inset}
.rt-pos-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.rt-pos{font-size:13px;font-weight:700;color:var(--text-dim);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.rtr.leader .rt-pos{background:rgba(244,196,48,.22);color:var(--gold)}
.rtr:nth-child(2) .rt-pos{background:rgba(203,213,225,.1);color:#cbd5e1}
.rtr:nth-child(3) .rt-pos{background:rgba(180,130,60,.12);color:#d4915a}
.rt-gap{font-size:9px;color:rgba(244,196,48,.65);font-weight:600;white-space:nowrap}
.rt-trend{font-size:10px;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:2px}
.rt-trend.up{color:#4ade80}
.rt-trend.dn{color:#f87171}
.rt-trend.eq{color:rgba(241,245,249,.35)}
.rt-name{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:9px}
.rt-pts{font-size:16px;font-weight:800;color:var(--emerald);text-align:right}
.rtr.leader .rt-pts{color:var(--gold);text-shadow:0 0 16px rgba(244,196,48,.45)}
.rt-exact{font-size:13px;font-weight:600;color:var(--gold);text-align:right}
.rt-win{font-size:13px;color:var(--cyan);text-align:right}

/* ── PAINEL DE PREMIAÇÃO ── */
.prize-panel{background:linear-gradient(135deg,rgba(244,196,48,.08),rgba(0,39,118,.2));border:1px solid rgba(244,196,48,.3);border-radius:var(--radius);padding:14px 18px;margin-bottom:14px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);position:relative;overflow:hidden}
.prize-panel::before{content:'💰';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.08;pointer-events:none}
.prize-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.prize-title{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:6px}
.prize-total{font-size:20px;font-weight:800;color:var(--gold);text-shadow:0 0 20px rgba(244,196,48,.5)}
.prize-total-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.prize-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.prize-card{background:rgba(255,255,255,.06);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,.1);text-align:center}
.prize-card.p1{border-color:rgba(244,196,48,.4);background:rgba(244,196,48,.08)}
.prize-card.p2{border-color:rgba(203,213,225,.25);background:rgba(203,213,225,.05)}
.prize-place{font-size:18px;margin-bottom:4px}
.prize-name{font-size:11px;font-weight:700;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prize-pct{font-size:10px;color:var(--text-dim);margin-bottom:6px}
.prize-value{font-size:16px;font-weight:800;color:var(--emerald)}
.prize-card.p1 .prize-value{color:var(--gold);text-shadow:0 0 14px rgba(244,196,48,.45)}
.prize-note{font-size:10px;color:var(--text-dim);margin-top:10px;padding-top:8px;border-top:1px solid rgba(255,255,255,.07);text-align:center;line-height:1.5}

/* ── MINI GRÁFICO TENDÊNCIA ── */
.trend-wrap{display:flex;align-items:center;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.trend-label{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.trend-svg{flex:1}

/* ── FILTROS ── */
.gfilters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.group-filters-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;margin-bottom:12px}
.group-filters-wrap::-webkit-scrollbar{height:2px}
.group-filters-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.group-filters{display:flex;gap:5px;min-width:max-content}
.fbtn{padding:4px 12px;border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;transition:.12s;white-space:nowrap}
.fbtn.active{background:linear-gradient(135deg,rgba(0,39,118,.6),rgba(16,185,129,.22));color:#fff;border-color:rgba(244,196,48,.38);box-shadow:0 0 10px rgba(244,196,48,.14)}
.fbtn:hover:not(.active){background:rgba(255,255,255,.1);color:var(--text)}

/* ── JOGOS ── */
.glist{display:flex;flex-direction:column;gap:8px;max-height:560px;overflow-y:auto;padding-right:2px}
.glist::-webkit-scrollbar{width:3px}
.glist::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.game-card{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:12px 14px;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);transition:.15s}
.game-card:hover{background:var(--glass-hover)}
.game-card.live-game{border:1px solid rgba(16,185,129,.45);border-left:3px solid var(--emerald);background:rgba(16,185,129,.07);box-shadow:0 0 20px rgba(16,185,129,.22);animation:livePulse 2.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{box-shadow:0 0 20px rgba(16,185,129,.22)}50%{box-shadow:0 0 32px rgba(16,185,129,.4)}}
.gc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;flex-wrap:wrap;gap:4px}
.gc-num{font-size:10px;color:var(--text-dim);font-weight:600}
.gc-grupo{font-size:10px;color:var(--text-dim);background:rgba(0,39,118,.42);padding:2px 8px;border-radius:8px;border:1px solid rgba(244,196,48,.22)}
.gc-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px}
.gc-status.pending{color:#fbbf24;background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.22)}
.gc-status.done{color:#4ade80;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.22)}
.gc-status.live{color:#4ade80;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.35);animation:blink .8s infinite alternate}
@keyframes blink{from{opacity:1}to{opacity:.6}}
.gc-main{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
.gc-team{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px}
.gc-team.r{text-align:right;flex-direction:row-reverse}
.gc-flag{font-size:16px}
.gc-score-area{text-align:center;min-width:80px}
.gc-score-official{font-size:22px;font-weight:800;color:var(--emerald);letter-spacing:3px;text-shadow:0 0 16px rgba(16,185,129,.5)}
.gc-score-min{font-size:10px;color:var(--emerald);margin-top:2px}
.score-input-wrap{display:flex;gap:5px;align-items:center;justify-content:center}
.sinput{width:36px;height:30px;background:var(--glass-input);border:1px solid rgba(255,255,255,.18);border-radius:7px;color:var(--text);text-align:center;font-size:14px;font-weight:700;-moz-appearance:textfield}
.sinput::-webkit-inner-spin-button{display:none}
.sinput:focus{outline:none;border-color:var(--gold);box-shadow:0 0 10px rgba(244,196,48,.28)}
.score-sep{color:rgba(255,255,255,.25);font-weight:700}
.palprow{margin-top:8px}
.palprow-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:5px 0;border-top:1px solid rgba(255,255,255,.07);user-select:none}
.palprow-toggle-left{font-size:10px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:6px}
.palprow-toggle-mini{display:flex;gap:4px;align-items:center}
.palprow-mini-tip{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.palprow-mini-chip{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;color:#fff;flex-shrink:0}
.palprow-mini-score{font-size:10px;font-weight:700;color:var(--text-dim)}
.palprow-mini-chip.exato{box-shadow:0 0 0 2px var(--emerald)}
.palprow-mini-chip.vencedor{box-shadow:0 0 0 2px var(--cyan)}
.palprow-mini-chip.errou{box-shadow:0 0 0 2px rgba(239,68,68,.5)}
.palprow-arrow{font-size:10px;color:var(--text-dim);transition:transform .2s}
.palprow-arrow.open{transform:rotate(180deg)}
.palprow-detail{display:none;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:4px;padding-top:6px}
.palprow-detail.open{display:grid}
.pchip{background:rgba(255,255,255,.05);border-radius:7px;padding:5px 9px;font-size:11px;display:flex;justify-content:space-between;align-items:center;border-left:2px solid rgba(255,255,255,.1);gap:6px;transition:.15s}
.pchip.exato{background:rgba(16,185,129,.1);border-left-color:var(--emerald)}
.pchip.vencedor{background:rgba(0,39,118,.32);border-left-color:var(--cyan)}
.pchip.errou{background:rgba(239,68,68,.07);border-left-color:rgba(239,68,68,.35)}
.pchip-left{display:flex;align-items:center;gap:5px}
.pchip-name{font-weight:700;font-size:10px;color:var(--text)}
.pchip-sc{font-weight:700;font-size:12px;color:var(--text)}
.pchip-pts{font-size:10px;font-weight:700;margin-left:3px}
.pchip-pts.p5{color:var(--emerald)}.pchip-pts.p3{color:var(--cyan)}.pchip-pts.p0{color:rgba(255,255,255,.2)}

/* ── TOAST "PLACAR EXATO" ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,rgba(16,185,129,.95),rgba(0,39,118,.95));border:1px solid rgba(16,185,129,.5);border-radius:14px;padding:12px 22px;text-align:center;z-index:999;backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(16,185,129,.3);transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-title{font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;gap:6px;justify-content:center}
.toast-sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:3px}

/* ── SIMULADOR ── */
.sim-layout{display:grid;grid-template-columns:1fr 272px;gap:12px;align-items:start}
@media(max-width:640px){.sim-layout{grid-template-columns:1fr}}
.sim-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.sim-group-block{margin-bottom:4px}
.sim-group-title{font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.7px;padding:8px 0 6px;border-bottom:1px solid rgba(244,196,48,.18);margin-bottom:6px}
.sim-game-row{display:grid;grid-template-columns:1fr 96px 1fr;gap:8px;align-items:center;background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:9px;padding:9px 12px;margin-bottom:5px;transition:.15s}
.sim-game-row.has-value{border-color:rgba(16,185,129,.42);background:rgba(16,185,129,.07)}
.sg-team{font-size:12px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:5px}
.sg-team.r{text-align:right;flex-direction:row-reverse}
.sg-flag{font-size:13px}
.sg-score{display:flex;gap:5px;align-items:center;justify-content:center}
.simin{width:34px;height:32px;background:var(--glass-input);border:1px solid rgba(255,255,255,.18);border-radius:7px;color:var(--text);text-align:center;font-size:14px;font-weight:700;-moz-appearance:textfield}
.simin::-webkit-inner-spin-button{display:none}
.simin:focus{outline:none;border-color:var(--gold);box-shadow:0 0 10px rgba(244,196,48,.22);background:rgba(255,255,255,.1)}
.sg-sep{font-size:12px;color:rgba(255,255,255,.22);font-weight:700}
.sim-right{position:sticky;top:10px}
.sim-rank-panel{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:var(--radius);overflow:hidden;backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur)}
.sim-rank-header{padding:10px 14px;background:rgba(0,39,118,.32);border-bottom:1px solid rgba(255,255,255,.1)}
.sim-rank-header h3{font-size:12px;font-weight:700;color:var(--text);margin-bottom:1px}
.sim-rank-header p{font-size:10px;color:var(--text-dim)}
.sim-rrow{display:grid;grid-template-columns:24px 1fr 44px 44px;gap:5px;padding:10px 14px;border-top:1px solid rgba(255,255,255,.06);align-items:center}
.sim-rrow:first-child{border-top:none}
.sim-rpos{font-size:13px;font-weight:700;color:var(--text-dim)}

/* ── PONTUAÇÃO ── */
function calcPoints(r,p1,p2){if(!r)return null;if(r[0]===p1&&r[1]===p2)return 5;const rw=r[0]>r[1]?1:r[0]<r[1]?-1:0,pw=p1>p2?1:p1<p2?-1:0;return rw===pw?3:0;}
function getPalpite(pn,i){const p=PARTICIPANTS.find(x=>x.name===pn);const a=p?.palpites||[];return[a[i*2]??0,a[i*2+1]??0];}
function getEff(i){return simResults[i]||officialResults[i];}
function calcScore(pn,useSim){let pts=0,ex=0,vc=0;for(let i=0;i<72;i++){const r=useSim?getEff(i):officialResults[i];if(!r)continue;const[p1,p2]=getPalpite(pn,i),p=calcPoints(r,p1,p2);pts+=p;if(p===5)ex++;else if(p===3)vc++;}return{pts,exatos:ex,venc:vc};}
function buildRanking(useSim){return PARTICIPANTS.map(p=>({...p,...calcScore(p.name,useSim)})).sort((a,b)=>b.pts-a.pts||b.exatos-a.exatos);}

/* ── MINI GRÁFICO DE TENDÊNCIA (SVG inline) ── */
function trendSVG(pts_history,color){
  if(!pts_history||pts_history.length<2) return'';
  const w=120,h=24,pad=3;
  const max=Math.max(...pts_history,1);
  const step=(w-pad*2)/(pts_history.length-1);
  const pts=pts_history.map((v,i)=>`${pad+i*step},${h-pad-(v/max)*(h-pad*2)}`).join(' ');
  return`<svg class="trend-svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="${pad+(pts_history.length-1)*step}" cy="${h-pad-(pts_history[pts_history.length-1]/max)*(h-pad*2)}" r="2.5" fill="${color}" opacity="0.9"/>
  </svg>`;
}

/* ── BARRA FASE ── */
function updatePhaseBar(){
  const done=officialResults.filter(r=>r!==null).length;
  const pct=Math.round((done/72)*100);
  document.getElementById('phaseCount').textContent=`${done} / 72 jogos · ${pct}%`;
  document.getElementById('phaseFill').style.width=pct+'%';
}

/* ── PREMIAÇÃO ── */
const APOSTA_POR_PESSOA = 30; // R$ por participante

function fmt(v){ return 'R$ ' + v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }

function renderPrize(ranking){
  const n     = PARTICIPANTS.length;
  const total = n * APOSTA_POR_PESSOA;
  const p1Val = total * 0.80;
  const p2Val = total * 0.20;

  // Quem está em 1º e 2º (pode haver empate)
  const leaderPts  = ranking[0]?.pts || 0;
  const leaders    = ranking.filter(p => p.pts === leaderPts);
  const segundoPts = ranking.find(p => p.pts < leaderPts)?.pts;
  const segundos   = segundoPts !== undefined ? ranking.filter(p => p.pts === segundoPts) : [];

  const multiLider = leaders.length > 1;

  // Valor por ganhador
  // Se empate no 1º: divide 100% entre os líderes (2º não recebe)
  const v1cada = leaders.length > 0
    ? (multiLider ? total / leaders.length : p1Val)
    : 0;
  const v2cada = (!multiLider && segundos.length > 0) ? p2Val / segundos.length : 0;

  const nomes1 = leaders.map(p => p.name).join(' · ');
  const nomes2 = segundos.map(p => p.name).join(' · ');

  const p2Html = multiLider
    ? `<div class="prize-card p2">
        <div class="prize-place">🥈</div>
        <div class="prize-name">2º lugar</div>
        <div class="prize-pct">20% do total</div>
        <div class="prize-value" style="color:var(--text-dim);font-size:12px">Sem premiação<br><span style="font-size:10px">(há empate no 1º)</span></div>
      </div>`
    : `<div class="prize-card p2">
        <div class="prize-place">🥈</div>
        <div class="prize-name">${nomes2 || '–'}</div>
        <div class="prize-pct">20% ÷ ${segundos.length}</div>
        <div class="prize-value">${segundos.length > 0 ? fmt(v2cada) : '–'}</div>
      </div>`;

  document.getElementById('prizePanel').innerHTML = `
    <div class="prize-header">
      <div class="prize-title">🏆 Premiação · ${n} participante${n!==1?'s':''}</div>
      <div style="text-align:right">
        <div class="prize-total">${fmt(total)}</div>
        <div class="prize-total-label">acumulado total</div>
      </div>
    </div>
    <div class="prize-grid">
      <div class="prize-card p1">
        <div class="prize-place">🥇</div>
        <div class="prize-name">${nomes1 || '–'}</div>
        <div class="prize-pct">${multiLider?'100%':'80%'}${leaders.length>1?' ÷ '+leaders.length:''}</div>
        <div class="prize-value">${fmt(v1cada)}</div>
      </div>
      ${p2Html}
      <div class="prize-card" style="display:flex;flex-direction:column;justify-content:center;gap:4px">
        <div style="font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Composição</div>
        <div style="font-size:11px;color:var(--text-muted)">${n} × ${fmt(APOSTA_POR_PESSOA)} = <strong style="color:var(--gold)">${fmt(total)}</strong></div>
        <div style="font-size:10px;color:var(--text-dim)">80% → 1º lugar</div>
        <div style="font-size:10px;color:var(--text-dim)">${multiLider?'0% → 2º lugar (suspenso)':'20% → 2º lugar'}</div>
      </div>
    </div>
    <div class="prize-note">
      R$ ${APOSTA_POR_PESSOA.toFixed(2).replace('.',',')} por participante · Empate no 1º: 100% dividido entre os líderes, 2º sem premiação
    </div>`;
}

/* ── RANKING ── */
function renderRanking(){
  const rk=buildRanking(false);
  // salva posições anteriores antes de sobrescrever
  PARTICIPANTS.forEach(p=>{if(rankPositions[p.name]) prevPositions[p.name]=rankPositions[p.name];});
  rk.forEach((p,i)=>{rankPositions[p.name]=i+1;});
  const leaderPts=rk[0]?.pts||0;
  const pc=['gold','silver','bronze'],md=['🥇','🥈','🥉'];
  document.getElementById('podium').innerHTML=rk.slice(0,3).map((p,i)=>{
    const gap=i>0?`<div class="pod-gap">−${leaderPts-p.pts} pts do líder</div>`:'';
    const hist=scoreHistory[p.name]||[];
    const trend=hist.length>=2?`<div class="trend-wrap"><span class="trend-label">Evolução</span>${trendSVG(hist,p.color)}</div>`:'';
    return`<div class="pod-card ${pc[i]}"><div class="pod-medal">${md[i]}</div>
      <div class="pod-av">${av(p.name,p.color,52)}</div>
      <div class="pod-name">${p.name}</div><div class="pod-pts">${p.pts}</div>
      <div class="pod-label">pontos</div>${gap}
      <div class="pod-detail">
        <div class="pod-stat"><span class="pod-stat-val gv">${p.exatos}</span><span class="pod-stat-label">Exatos</span></div>
        <div class="pod-stat"><span class="pod-stat-val">${p.venc}</span><span class="pod-stat-label">Vencedor</span></div>
      </div>${trend}</div>`;
  }).join('');
  document.getElementById('rankBody').innerHTML=rk.map((p,i)=>{
    const gap=i>0?`<div class="rt-gap">−${leaderPts-p.pts}pts</div>`:`<div class="rt-gap" style="color:rgba(244,196,48,.55);font-size:9px">LÍDER</div>`;
    // indicador de evolução de posição ▲▼▬
    const prev=prevPositions[p.name];
    let trendEl='';
    if(prev!==undefined){
      const diff=prev-(i+1); // positivo = subiu, negativo = desceu
      if(diff>0) trendEl=`<span class="rt-trend up">▲ +${diff}</span>`;
      else if(diff<0) trendEl=`<span class="rt-trend dn">▼ ${diff}</span>`;
      else trendEl=`<span class="rt-trend eq">▬</span>`;
    }
    return`<div class="rtr${i===0?' leader':''}">
      <div class="rt-pos-wrap"><div class="rt-pos">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>${gap}</div>
      <div class="rt-name">${av(p.name,p.color,36)}<span>${p.name}</span>${trendEl}</div>
      <div class="rt-pts">${p.pts}</div><div class="rt-exact">${p.exatos}</div><div class="rt-win">${p.venc}</div>
    </div>`;
  }).join('');
  renderPrize(rk);
  updatePhaseBar();
}

function filterGames(f,btn){currentFilter=f;document.querySelectorAll('#jogos .gfilters .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderGames();}
function renderGames(){
  const list=document.getElementById('gamesList');
  const filtered=GAMES_RAW.filter(g=>{const idx=g.n-1,isLive=!!liveGames[idx],isDone=!!officialResults[idx];let ok=true;if(currentFilter==='pendentes')ok=!isDone&&!isLive;else if(currentFilter==='finalizados')ok=isDone;else if(currentFilter==='live')ok=isLive;if(groupFilter!=='todos')ok=ok&&(g.g===groupFilter);return ok;});

      const[pa,pb]=getPalpite(p.name,idx),er=res||(isLive?live.score:null),pts=er?calcPoints(er,pa,pb):null;

      if(pts===5){cls='exato';ptsBadge='+5';ptsCls='p5';}

      return{p,pa,pb,cls,ptsBadge,ptsCls,firstName,pts};
    });
    // Mini chips (sempre visíveis — avatares coloridos com borda de acerto)
    const miniChips=chipsData.map(d=>`<div class="palprow-mini-chip ${d.cls}" style="background:${d.p.color}" title="${d.firstName}: ${d.pa}–${d.pb}${d.ptsBadge?(' ('+d.ptsBadge+')'):''}">${d.p.abbr||d.firstName.slice(0,2).toUpperCase()}</div>`).join('');
    // Score summary mini
    const exatos=chipsData.filter(d=>d.cls==='exato').length;
    const venc=chipsData.filter(d=>d.cls==='vencedor').length;
    const miniInfo=res||isLive?`<span class="palprow-mini-score">${exatos?'🎯'+exatos:''} ${venc?'✓'+venc:''}</span>`:'';
    // Chips detalhados (colapsáveis)
    const detailChips=chipsData.map(d=>`<div class="pchip ${d.cls}"><div class="pchip-left">${av(d.p.name,d.p.color,24)}<span class="pchip-name">${d.firstName}</span></div><span class="pchip-sc">${d.pa}–${d.pb}${d.ptsBadge?`<span class="pchip-pts ${d.ptsCls}">${d.ptsBadge}</span>`:''}</span></div>`).join('');
    const chips=`<div class="palprow-toggle" onclick="togglePalpites(this)">
      <div class="palprow-toggle-left">
        <div class="palprow-mini-tip">${miniChips}</div>
        ${miniInfo}
      </div>
      <span class="palprow-arrow">▾</span>
    </div>
    <div class="palprow-detail">${detailChips}</div>`;
    let scoreArea='',statusBadge='',cardCls='';
    if(isDone){scoreArea=`<div class="gc-score-official">${res[0]}–${res[1]}</div>`;statusBadge='<span class="gc-status done">✔ Finalizado</span>';}
    else if(isLive){scoreArea=`<div class="gc-score-official">${live.score[0]}–${live.score[1]}</div><div class="gc-score-min">🔴 ${live.minute}</div>`;statusBadge='<span class="gc-status live">🔴 AO VIVO</span>';cardCls='live-game';}
    else{scoreArea=`<div class="score-input-wrap"><input class="sinput" type="number" min="0" max="20" placeholder="?" data-game="${idx}" data-team="0" onchange="updateOfficial(this)"><span class="score-sep">×</span><input class="sinput" type="number" min="0" max="20" placeholder="?" data-game="${idx}" data-team="1" onchange="updateOfficial(this)"></div>`;statusBadge='<span class="gc-status pending">⏳ Pendente</span>';}
    return`<div class="game-card ${cardCls}"><div class="gc-header"><span class="gc-num">Jogo #${game.n}</span><span class="gc-grupo">Grupo ${game.g}</span>${statusBadge}</div><div class="gc-main"><div class="gc-team"><span class="gc-flag">${flag(game.t1)}</span>${game.t1}</div><div class="gc-score-area">${scoreArea}</div><div class="gc-team r"><span class="gc-flag">${flag(game.t2)}</span>${game.t2}</div></div><div class="palprow">${chips}</div></div>`;
  }).join('');
}

function updateOfficial(el){
  const gi=parseInt(el.dataset.game),team=parseInt(el.dataset.team);
  if(!pendingOfficial[gi])pendingOfficial[gi]=[null,null];
  pendingOfficial[gi][team]=el.value!==''?parseInt(el.value):null;
  const pair=pendingOfficial[gi];
  if(pair[0]!==null&&pair[1]!==null){
    officialResults[gi]=[pair[0],pair[1]];
    // detectar placar exato e mostrar toast
    PARTICIPANTS.forEach(p=>{
      const[pa,pb]=getPalpite(p.name,gi);
      if(calcPoints([pair[0],pair[1]],pa,pb)===5) showToast(p.name,p.color);
    });
    // atualizar histórico de pontos (agrupado a cada 6 jogos)
    PARTICIPANTS.forEach(p=>{
      const round=Math.floor(gi/6);
      if(!scoreHistory[p.name]) scoreHistory[p.name]=[];
      let pts=0;
      for(let i=round*6;i<Math.min((round+1)*6,72);i++){
        const r=officialResults[i];if(!r)continue;
        const[pa,pb]=getPalpite(p.name,i);pts+=calcPoints(r,pa,pb)||0;
      }
      scoreHistory[p.name][round]=pts;
    });
    renderRanking();renderSimRanking();
  }
}

/* ── SIMULADOR ── */
function renderSimFilters(){document.getElementById('simFilters').innerHTML=['todos',...GROUPS].map((g,i)=>`<button class="fbtn${i===0?' active':''}" onclick="filterSim('${g}',this)">${g==='todos'?'Todos':'Gr. '+g}</button>`).join('');}
function filterSim(g,btn){simGroupFilter=g;document.querySelectorAll('#simFilters .fbtn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderSimGames();}
function renderSimGames(){
  const container=document.getElementById('simGames');
  const pending=GAMES_RAW.filter(g=>!officialResults[g.n-1]);
  const filtered=simGroupFilter==='todos'?pending:pending.filter(g=>g.g===simGroupFilter);
  if(!filtered.length){container.innerHTML='<div class="empty">Sem jogos pendentes neste grupo.</div>';return;}
  const byGroup={};filtered.forEach(g=>{(byGroup[g.g]||(byGroup[g.g]=[])).push(g);});
  container.innerHTML=Object.entries(byGroup).map(([gr,games])=>`<div class="sim-group-block"><div class="sim-group-title">Grupo ${gr}</div>${games.map(game=>{const idx=game.n-1,sv=simResults[idx];return`<div class="sim-game-row${sv!==undefined?' has-value':''}" id="sgrow-${idx}"><div class="sg-team"><span class="sg-flag">${flag(game.t1)}</span>${game.t1}</div><div class="sg-score"><input class="simin" type="number" min="0" max="20" placeholder="?" value="${sv!==undefined?sv[0]:''}" data-game="${idx}" data-team="0" onchange="simInputChange(this)"><span class="sg-sep">×</span><input class="simin" type="number" min="0" max="20" placeholder="?" value="${sv!==undefined?sv[1]:''}" data-game="${idx}" data-team="1" onchange="simInputChange(this)"></div><div class="sg-team r"><span class="sg-flag">${flag(game.t2)}</span>${game.t2}</div></div>`;}).join('')}</div>`).join('');
}
function simInputChange(el){const gi=parseInt(el.dataset.game),team=parseInt(el.dataset.team);if(!simBuffer[gi])simBuffer[gi]=[null,null];simBuffer[gi][team]=el.value!==''?parseInt(el.value):null;const pair=simBuffer[gi],row=document.getElementById('sgrow-'+gi);if(pair[0]!==null&&pair[1]!==null){simResults[gi]=[pair[0],pair[1]];if(row)row.classList.add('has-value');}else{delete simResults[gi];if(row)row.classList.remove('has-value');}renderSimRanking();}
function renderSimRanking(){
  const base=buildRanking(false),sim=buildRanking(true),sc=Object.keys(simResults).length;
  document.getElementById('simRanking').innerHTML=sim.map((p,i)=>{const bPts=base.find(b=>b.name===p.name)?.pts||0,delta=p.pts-bPts,dcls=delta>0?'up':delta<0?'dn':'eq',dstr=delta>0?`+${delta}`:delta<0?`${delta}`:'=';return`<div class="sim-rrow"><div class="sim-rpos">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1+'º'}</div><div class="sim-rname">${av(p.name,p.color,26)}<span>${p.name}</span></div><div class="sim-rpts">${p.pts}</div><div class="sim-rdelta ${dcls}">${dstr}</div></div>`;}).join('');
  document.getElementById('simGain').innerHTML=`<div class="sim-gain-title">⚡ Ganho projetado</div>`+sim.map(p=>{const bPts=base.find(b=>b.name===p.name)?.pts||0,gain=p.pts-bPts,cls=gain>0?'pos':gain<0?'neg':'zero',str=gain>0?`+${gain} pts`:gain<0?`${gain} pts`:'sem mudança';return`<div class="sim-gain-row"><span class="sim-gain-name">${av(p.name,p.color,22)}<span>${p.name.split(" ")[0]}</span></span><span class="sim-gain-val ${cls}">${str}</span></div>`;}).join('');
  document.getElementById('simSummary').innerHTML=`<div class="sim-summary-title">Resumo</div><div class="sim-stat"><span class="sim-stat-label">Jogos simulados</span><span class="sim-stat-val">${sc}</span></div><div class="sim-stat"><span class="sim-stat-label">Jogos pendentes</span><span class="sim-stat-val">${GAMES_RAW.filter(g=>!officialResults[g.n-1]).length}</span></div><div class="sim-stat"><span class="sim-stat-label">Pts extras possíveis</span><span class="sim-stat-val">${sc*5}</span></div>`;
  // Premiação projetada no simulador
  const n=PARTICIPANTS.length, total=n*APOSTA_POR_PESSOA;
  const leaderPts2=sim[0]?.pts||0, leaders2=sim.filter(p=>p.pts===leaderPts2);
  const multiLider2=leaders2.length>1;
  const segundos2=sim.filter(p=>p.pts<leaderPts2&&p.pts===sim.find(x=>x.pts<leaderPts2)?.pts);
  const v1=multiLider2?total/leaders2.length:total*0.8;
  const v2=(!multiLider2&&segundos2.length>0)?total*0.2/segundos2.length:0;
  const el=document.getElementById('simPrize');
  if(el) el.innerHTML=`<div class="sim-summary-title">💰 Premiação projetada</div>`+
    sim.map(p=>{
      const isL=leaders2.includes(p), isS=!multiLider2&&segundos2.includes(p);
      const val=isL?v1:isS?v2:0;
      const cls=val>0?'pos':'zero';
      return`<div class="sim-stat"><span class="sim-stat-label">${p.name.split(' ')[0]}</span><span class="sim-stat-val" style="color:${val>0?'var(--gold)':'var(--text-dim)'}">${val>0?fmt(val):'–'}</span></div>`;
    }).join('');
}
function resetSim(){Object.keys(simResults).forEach(k=>delete simResults[k]);Object.keys(simBuffer).forEach(k=>delete simBuffer[k]);renderSimGames();renderSimRanking();}

/* ── HISTÓRICO ── */
function renderHist(){
  document.getElementById('histCards').innerHTML=PARTICIPANTS.map(p=>{
    let total=0,ex=0,vc=0,er=0,pend=0;
    for(let i=0;i<72;i++){const r=officialResults[i];if(!r){pend++;continue;}const[pa,pb]=getPalpite(p.name,i),pts=calcPoints(r,pa,pb);total+=pts;if(pts===5)ex++;else if(pts===3)vc++;else er++;}
    const played=72-pend,pct=played>0?Math.round(((ex+vc)/played)*100):0,pos=rankPositions[p.name]||1;
    const hist=scoreHistory[p.name]||[];
    const trend=hist.length>=2?`<div class="trend-wrap" style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06)"><span class="trend-label">Evolução por rodada</span>${trendSVG(hist,p.color)}</div>`:'';
    return`<div class="hcard"><div class="hcard-name">${av(p.name,p.color,36)}${p.name}</div>
      <div class="hrow2"><span class="hlab">Total de pontos</span><span class="hval y">${total}</span></div>
      <div class="hrow2"><span class="hlab">Exatos (5pts)</span><span class="hval g">${ex}</span></div>
      <div class="hrow2"><span class="hlab">Vencedor certo (3pts)</span><span class="hval b">${vc}</span></div>
      <div class="hrow2"><span class="hlab">Erros</span><span class="hval">${er}</span></div>
      <div class="hrow2"><span class="hlab">Aproveitamento</span><span class="hval g">${pct}%</span></div>
      <div class="hrow2"><span class="hlab">Restantes</span><span class="hval">${pend}</span></div>
      ${trend}</div>`;
  }).join('');
  document.getElementById('histGrupos').innerHTML=GROUPS.map(gr=>{const gj=GAMES_RAW.filter(g=>g.g===gr);return`<div class="grp-sec"><div class="grp-title">Grupo ${gr}</div><div style="overflow-x:auto"><table><thead><tr><th style="text-align:left">Jogo</th><th>Oficial</th>${PARTICIPANTS.map(p=>`<th>${p.name}</th>`).join('')}</tr></thead><tbody>${gj.map(game=>{const idx=game.n-1,res=officialResults[idx];const cols=PARTICIPANTS.map(p=>{if(!res)return`<td style="text-align:center">–</td>`;const[pa,pb]=getPalpite(p.name,idx),pts=calcPoints(res,pa,pb);return`<td style="text-align:center"><span class="badge ${pts===5?'exact':pts===3?'win':'miss'}">${pa}–${pb} ${pts===5?'5':pts===3?'3':'0'}pts</span></td>`;}).join('');return`<tr><td>${flag(game.t1)} ${game.t1} × ${flag(game.t2)} ${game.t2}</td><td style="text-align:center;color:var(--text)">${res?`<strong>${res[0]}–${res[1]}</strong>`:'?'}</td>${cols}</tr>`;}).join('')}</tbody></table></div></div>`;}).join('');
}

/* ── ESPN / AO VIVO ── */
const TM={'brazil':'Brasil','mexico':'México','south africa':'África do Sul','south korea':'Coréia do Sul','korea republic':'Coréia do Sul','czech republic':'Rep. Tcheca','czechia':'Rep. Tcheca','canada':'Canadá','bosnia':'Bósnia','bosnia-herzegovina':'Bósnia','usa':'EUA','united states':'EUA','paraguay':'Paraguai','australia':'Austrália','turkey':'Turquia','qatar':'Catar','switzerland':'Suiça','morocco':'Marrocos','haiti':'Haiti','scotland':'Escócia','germany':'Alemanha','curacao':'Curaçao','netherlands':'Holanda','japan':'Japão',"côte d'ivoire":'Costa do Marfim','ivory coast':'Costa do Marfim','ecuador':'Equador','sweden':'Suécia','tunisia':'Tunísia','spain':'Espanha','cape verde':'Cabo Verde','belgium':'Bélgica','egypt':'Egito','saudi arabia':'Arábia Saudita','uruguay':'Uruguai','iran':'Irã','new zealand':'Nova Zelândia','france':'França','senegal':'Senegal','iraq':'Iraque','norway':'Noruega','argentina':'Argentina','algeria':'Argélia','austria':'Áustria','jordan':'Jordânia','portugal':'Portugal','congo':'Congo','england':'Inglaterra','croatia':'Croácia','ghana':'Gana','panama':'Panamá','uzbekistan':'Uzbequistão','colombia':'Colômbia'};
function nT(n){return TM[n.toLowerCase()]||n;}
function mG(h,a){for(let i=0;i<GAMES_RAW.length;i++){const g=GAMES_RAW[i],g1=g.t1.toLowerCase(),g2=g.t2.toLowerCase(),hL=h.toLowerCase(),aL=a.toLowerCase();if((g1===hL||g1.includes(hL)||hL.includes(g1))&&(g2===aL||g2.includes(aL)||aL.includes(g2)))return i;if((g2===hL||g2.includes(hL)||hL.includes(g2))&&(g1===aL||g1.includes(aL)||aL.includes(g1)))return i;}return -1;}
async function fetchLive(){try{const r=await fetch('https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard',{signal:(()=>{const c=new AbortController();setTimeout(()=>c.abort(),8000);return c.signal;})()});if(!r.ok)throw new Error();const data=await r.json();let upd=false;for(const ev of(data.events||[])){const comp=ev.competitions?.[0];if(!comp)continue;const home=comp.competitors?.find(c=>c.homeAway==='home'),away=comp.competitors?.find(c=>c.homeAway==='away');if(!home||!away)continue;const hN=nT(home.team?.displayName||''),aN=nT(away.team?.displayName||''),hS=parseInt(home.score||0),aS=parseInt(away.score||0),status=comp.status?.type?.name||'',minute=comp.status?.displayClock||'',completed=comp.status?.type?.completed||false,idx=mG(hN,aN);if(idx===-1)continue;if(completed){officialResults[idx]=[hS,aS];delete liveGames[idx];upd=true;}else if(status.includes('IN_PROGRESS')||status.includes('HALFTIME')){liveGames[idx]={score:[hS,aS],minute};upd=true;}}document.getElementById('hstatus').textContent='Atualizado '+new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});if(upd){renderRanking();if(document.getElementById('jogos').classList.contains('active'))renderGames();}}catch(e){document.getElementById('hstatus').textContent='Sem dados ao vivo (Copa não começou)';}}
function toggleRefresh(){refreshOn=!refreshOn;const b=document.getElementById('liveBadge'),d=document.getElementById('liveDot'),t=document.getElementById('liveText');if(refreshOn){b.classList.remove('paused');d.style.background='#4ade80';d.style.animation='';d.style.boxShadow='0 0 6px #4ade80';t.textContent='AO VIVO';startRefresh();}else{b.classList.add('paused');d.style.background='#9ca3af';d.style.animation='none';d.style.boxShadow='none';t.textContent='PAUSADO';clearInterval(refreshTimer);document.getElementById('hstatus').textContent='Auto-refresh pausado';}}
function startRefresh(){fetchLive();refreshTimer=setInterval(()=>{if(refreshOn)fetchLive();},60000);}

/* ── TOGGLE PALPITES ── */
function togglePalpites(el){
  const arrow=el.querySelector('.palprow-arrow');
  const detail=el.nextElementSibling;
  const isOpen=detail.classList.contains('open');
  detail.classList.toggle('open',!isOpen);
  if(arrow) arrow.classList.toggle('open',!isOpen);
}

/* ── TABS ── */
function goTab(id,btn){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(id).classList.add('active');btn.classList.add('active');if(id==='jogos')renderGames();if(id==='sim'){renderSimGames();renderSimRanking();}if(id==='hist')renderHist();if(id==='ranking')renderRanking();}

/* ── CARREGAR PARTICIPANTES DO DRIVE (Apps Script) ── */
async function fetchParticipants(){
  const statusEl = document.getElementById('syncStatus');
  if(APPS_SCRIPT_URL === 'COLE_A_URL_DO_APPS_SCRIPT_AQUI'){
    if(statusEl) statusEl.textContent = '⚠️ Apps Script não configurado — usando dados locais';
    return;
  }
  try {
    if(statusEl) statusEl.textContent = '🔄 Sincronizando palpites do Drive...';
    const r = await fetch(APPS_SCRIPT_URL + '?t=' + Date.now(), {signal:(()=>{const c=new AbortController();setTimeout(()=>c.abort(),10000);return c.signal;})()});
    if(!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if(data.participants && data.participants.length > 0){
      PARTICIPANTS = data.participants.map((p, i) => ({
        name:     p.name,
        color:    p.color || gerarCor(i),
        abbr:     p.abbr  || gerarAbbr(p.name),
        // Sanitiza palpites: remove datas seriais do Excel (valores > 20 são inválidos como gols)
        palpites: (p.palpites || []).map(v => {
          const n = Number(v);
          return (!isNaN(n) && n >= 0 && n <= 20) ? n : 0;
        })
      }));
      const upd = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '–';
      if(statusEl) statusEl.textContent = `✅ ${PARTICIPANTS.length} participantes · Drive sync ${upd}`;
    } else {
      if(statusEl) statusEl.textContent = '⚠️ Drive sem arquivos válidos — usando dados locais';
    }
    // re-renderiza tudo com novos participantes
    renderRanking(); renderSimRanking();
    if(document.getElementById('jogos').classList.contains('active')) renderGames();
    if(document.getElementById('hist').classList.contains('active')) renderHist();
  } catch(e) {
    if(statusEl) statusEl.textContent = '❌ Erro ao sincronizar Drive: ' + e.message;
  }
}

/* ── INIT ── */
initGroupFilters();renderSimFilters();renderRanking();startRefresh();
// Busca palpites do Drive ao iniciar e a cada 10 minutos
fetchParticipants();
setInterval(fetchParticipants, 10 * 60 * 1000);
</script>
